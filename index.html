<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayvn | Three Paths. One Purpose.</title>

  <link rel="preload" as="image" href="images/hayvn-logo-gold.png">
  <link rel="preload" as="image" href="images/hayvn-portal-mobile.png">

  <style>
    :root {
      --black: #030302;
      --gold: #d7ad5f;
      --gold-soft: #f1d48b;
      --cream: #f7ead1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--black);
      color: var(--cream);
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(215,173,95,.12), transparent 36%),
        #030302;
      z-index: 0;
    }

    .portal {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(14px, 2.5vw, 34px);
    }

    .portal-stage {
      position: relative;
      width: min(1080px, 90vw);
      aspect-ratio: 1536 / 1024;
      opacity: 0;
      transform: scale(.94);
      animation: portalReveal 2.6s ease forwards;
      filter: drop-shadow(0 0 34px rgba(215,173,95,.24));
    }

    .portal-stage picture,
    .portal-image {
      width: 100%;
      height: 100%;
      display: block;
    }

    .portal-image {
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .portal-link {
      position: absolute;
      z-index: 3;
      display: block;
      border-radius: 999px;
      outline: none;
      cursor: pointer;
      border: 1px solid transparent;
      transition: box-shadow .35s ease, background .35s ease, transform .35s ease, border-color .35s ease;
    }

    .portal-link::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at center, rgba(241,212,139,.25), rgba(215,173,95,.08) 45%, transparent 72%);
      opacity: 0;
      transition: opacity .35s ease;
    }

    .portal-link::after {
      content: attr(data-title);
      position: absolute;
      left: 50%;
      bottom: -44px;
      transform: translateX(-50%) translateY(8px);
      opacity: 0;
      white-space: nowrap;
      color: var(--gold-soft);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(215,173,95,.36);
      transition: opacity .35s ease, transform .35s ease;
    }

    .portal-link:hover,
    .portal-link:focus-visible {
      transform: translateY(-4px) scale(1.015);
      border-color: rgba(241,212,139,.38);
      box-shadow:
        0 0 38px rgba(215,173,95,.26),
        inset 0 0 44px rgba(215,173,95,.10);
      background: rgba(215,173,95,.025);
    }

    .portal-link:hover::before,
    .portal-link:focus-visible::before,
    .portal-link:hover::after,
    .portal-link:focus-visible::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* DESKTOP CLICK AREAS */
    .healing {
      left: 2.6%;
      top: 43.2%;
      width: 31.2%;
      height: 49%;
    }

    .studio {
      left: 34.4%;
      top: 43.2%;
      width: 31.2%;
      height: 49%;
    }

    .boudoir {
      left: 66.2%;
      top: 43.2%;
      width: 31.2%;
      height: 49%;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      z-index: 5;
      color: var(--gold-soft);
      font-family: Georgia, serif;
      font-size: clamp(24px, 3vw, 42px);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: 0;
      pointer-events: none;
      text-shadow:
        0 0 12px rgba(241,212,139,.45),
        0 0 34px rgba(215,173,95,.35),
        0 0 72px rgba(215,173,95,.18);
      animation: hintMagicIn 1.6s ease forwards 2.4s, hintGlow 2.8s ease-in-out infinite 4s;
    }

    .hint::before,
    .hint::after {
      content: "✦";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold-soft);
      font-size: .55em;
      opacity: .85;
      text-shadow: 0 0 18px rgba(241,212,139,.7);
      animation: starPulse 2.2s ease-in-out infinite;
    }

    .hint::before { left: -42px; }
    .hint::after { right: -42px; animation-delay: .6s; }

    .audio-toggle {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      width: 46px;
      height: 46px;
      border-radius: 999px;
      border: 1px solid rgba(241,212,139,.45);
      background: rgba(3,3,2,.70);
      color: var(--gold-soft);
      backdrop-filter: blur(14px);
      cursor: pointer;
      font-size: 18px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 36px rgba(0,0,0,.36);
    }

    .audio-toggle.muted { opacity: .62; }

    @keyframes portalReveal {
      0% {
        opacity: 0;
        transform: scale(.92);
        filter: blur(10px) drop-shadow(0 0 0 rgba(215,173,95,0));
      }
      58% {
        opacity: 1;
        transform: scale(1.012);
        filter: blur(0) drop-shadow(0 0 46px rgba(215,173,95,.30));
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0) drop-shadow(0 0 34px rgba(215,173,95,.22));
      }
    }

    @keyframes hintMagicIn {
      0% { opacity: 0; transform: translateX(-50%) translateY(14px) scale(.94); filter: blur(8px); }
      60% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.04); filter: blur(0); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes hintGlow {
      0%, 100% {
        text-shadow:
          0 0 12px rgba(241,212,139,.42),
          0 0 34px rgba(215,173,95,.32),
          0 0 72px rgba(215,173,95,.16);
      }
      50% {
        text-shadow:
          0 0 18px rgba(241,212,139,.72),
          0 0 48px rgba(215,173,95,.52),
          0 0 98px rgba(215,173,95,.26);
      }
    }

    @keyframes starPulse {
      0%, 100% { opacity: .45; transform: translateY(-50%) scale(.86) rotate(0deg); }
      50% { opacity: 1; transform: translateY(-50%) scale(1.18) rotate(12deg); }
    }

    /* MOBILE VERSION */
    @media (max-width: 760px) {
      html, body {
        overflow: auto;
      }

      .portal {
        min-height: 100svh;
        padding: 0;
      }

      .portal-stage {
        width: 100vw;
        height: 100svh;
        aspect-ratio: auto;
      }

      .portal-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .portal-link::after {
        display: none;
      }

      /* MOBILE CLICK AREAS FOR VERTICAL IMAGE */
      .healing {
        left: 18%;
        top: 34%;
        width: 64%;
        height: 17%;
      }

      .studio {
        left: 18%;
        top: 54%;
        width: 64%;
        height: 17%;
      }

      .boudoir {
        left: 18%;
        top: 74%;
        width: 64%;
        height: 17%;
      }

      .hint {
        width: 100%;
        text-align: center;
        bottom: 18px;
        font-size: clamp(22px, 8vw, 32px);
      }

      .hint::before { left: 14px; }
      .hint::after { right: 14px; }

      .audio-toggle {
        width: 42px;
        height: 42px;
        right: 14px;
        bottom: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="portal" aria-label="Hayvn portal">
    <div class="portal-stage">
      <picture>
        <source media="(max-width: 760px)" srcset="images/hayvn-portal-mobile.png">
        <img
          class="portal-image"
          src="images/hayvn-logo-gold.png"
          alt="Hayvn — Three Paths. One Purpose."
          fetchpriority="high"
          decoding="async"
        >
      </picture>

      <a class="portal-link healing" href="https://hayvnhealing.com" data-title="Hayvn Healing" aria-label="Enter Hayvn Healing"></a>

      <a class="portal-link studio" href="studio.html?skipIntro=1" data-title="Hayvn Studio" aria-label="Enter Hayvn Studio"></a>

      <a class="portal-link boudoir" href="https://hayvnboudoir.com" data-title="Hayvn Boudoir" aria-label="Enter Hayvn Boudoir"></a>
    </div>
  </main>

  <div class="hint">Choose your path</div>

  <audio id="portalMusic" src="audio/intro-reveal.mp3" preload="auto" loop></audio>
  <button class="audio-toggle" id="audioToggle" type="button" aria-label="Toggle music">♪</button>

  <script>
    const portalMusic = document.getElementById("portalMusic");
    const audioToggle = document.getElementById("audioToggle");

    let muted = false;

    function updateAudioButton() {
      audioToggle.textContent = muted ? "♪̸" : "♪";
      audioToggle.classList.toggle("muted", muted);
      portalMusic.muted = muted;
    }

    function startMusic() {
      if (muted) return;
      portalMusic.volume = 0.38;
      portalMusic.play().catch(() => {});
    }

    updateAudioButton();
    startMusic();

    window.addEventListener("pointerdown", startMusic, { once: true });
    window.addEventListener("touchstart", startMusic, { once: true });

    audioToggle.addEventListener("click", () => {
      muted = !muted;
      updateAudioButton();

      if (!muted) {
        startMusic();
      } else {
        portalMusic.pause();
      }
    });
  </script>
</body>
</html>
