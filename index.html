<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayvn | Three Paths. One Purpose.</title>
  <meta name="description" content="Hayvn portal — Hayvn Healing, Hayvn Studio, and Hayvn Boudoir." />

  <link rel="preload" as="image" href="images/hayvn-logo-gold.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #030302;
      --gold: #d7ad5f;
      --gold-soft: #f1d48b;
      --cream: #f7ead1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--black);
      color: var(--cream);
      font-family: Inter, system-ui, sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(215,173,95,.12), transparent 36%),
        radial-gradient(circle at 50% 100%, rgba(215,173,95,.08), transparent 42%),
        #030302;
      z-index: 0;
    }

    .portal {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(14px, 2.5vw, 34px);
    }

    .portal-stage {
      position: relative;
      width: min(1080px, 90vw);
      aspect-ratio: 1536 / 1024;
      opacity: 0;
      transform: scale(.94);
      animation: portalReveal 2.6s ease forwards;
      filter: drop-shadow(0 0 34px rgba(215,173,95,.24));
    }

    .portal-stage::after {
      content: "";
      position: absolute;
      inset: -2%;
      pointer-events: none;
      border-radius: 26px;
      background: radial-gradient(circle at center, transparent 48%, rgba(3,3,2,.36) 100%);
      opacity: .6;
    }

    .portal-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .portal-link {
      position: absolute;
      z-index: 3;
      display: block;
      border-radius: 999px;
      outline: none;
      cursor: pointer;
      transition: box-shadow .35s ease, background .35s ease, transform .35s ease, border-color .35s ease;
      border: 1px solid transparent;
    }

    .portal-link::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at center, rgba(241,212,139,.22), rgba(215,173,95,.08) 45%, transparent 72%);
      opacity: 0;
      transition: opacity .35s ease;
    }

    .portal-link::after {
      content: attr(data-title);
      position: absolute;
      left: 50%;
      bottom: -44px;
      transform: translateX(-50%) translateY(8px);
      opacity: 0;
      white-space: nowrap;
      color: var(--gold-soft);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(215,173,95,.36);
      transition: opacity .35s ease, transform .35s ease;
    }

    .portal-link:hover,
    .portal-link:focus-visible {
      transform: translateY(-4px) scale(1.015);
      border-color: rgba(241,212,139,.38);
      box-shadow:
        0 0 38px rgba(215,173,95,.26),
        inset 0 0 44px rgba(215,173,95,.10);
      background: rgba(215,173,95,.025);
    }

    .portal-link:hover::before,
    .portal-link:focus-visible::before,
    .portal-link:hover::after,
    .portal-link:focus-visible::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .healing {
      left: 2.6%;
      top: 43.2%;
      width: 31.2%;
      height: 49%;
    }

    .studio {
      left: 34.4%;
      top: 43.2%;
      width: 31.2%;
      height: 49%;
    }

    .boudoir {
      left: 66.2%;
      top: 43.2%;
      width: 31.2%;
      height: 49%;
    }

    .audio-toggle {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      width: 46px;
      height: 46px;
      border-radius: 999px;
      border: 1px solid rgba(241,212,139,.45);
      background: rgba(3,3,2,.70);
      color: var(--gold-soft);
      backdrop-filter: blur(14px);
      cursor: pointer;
      font-size: 18px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 36px rgba(0,0,0,.36);
      transition: transform .25s ease, border-color .25s ease, background .25s ease;
    }

    .audio-toggle:hover {
      transform: translateY(-2px);
      border-color: rgba(241,212,139,.85);
      background: rgba(215,173,95,.10);
    }

    .audio-toggle.muted { opacity: .62; }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 5;
      color: rgba(247,234,209,.62);
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      opacity: 0;
      animation: hintIn 1s ease forwards 2.8s;
      pointer-events: none;
    }

    @keyframes portalReveal {
      0% { opacity: 0; transform: scale(.92); filter: blur(10px) drop-shadow(0 0 0 rgba(215,173,95,0)); }
      58% { opacity: 1; transform: scale(1.012); filter: blur(0) drop-shadow(0 0 46px rgba(215,173,95,.30)); }
      100% { opacity: 1; transform: scale(1); filter: blur(0) drop-shadow(0 0 34px rgba(215,173,95,.22)); }
    }

    @keyframes hintIn {
      to { opacity: 1; }
    }

    @media (max-width: 760px) {
      html, body { overflow: auto; }

      .portal {
        min-height: 100svh;
        padding: 18px 10px 70px;
      }

      .portal-stage {
        width: min(620px, 96vw);
        max-width: 96vw;
      }

      .portal-link::after { display: none; }

      .hint {
        width: 100%;
        text-align: center;
        bottom: 18px;
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="portal" aria-label="Hayvn portal">
    <div class="portal-stage">
      <img class="portal-image" src="images/hayvn-logo-gold.png" alt="Hayvn — Three Paths. One Purpose." fetchpriority="high" decoding="async">

      <a class="portal-link healing" href="https://hayvnhealing.com" data-title="Hayvn Healing" aria-label="Enter Hayvn Healing"></a>
      <a class="portal-link studio" href="https://hayvnstudio.com/studio.html?skipIntro=1" data-title="Hayvn Studio" aria-label="Enter Hayvn Studio"></a>
      <a class="portal-link boudoir" href="https://hayvnboudoir.com" data-title="Hayvn Boudoir" aria-label="Enter Hayvn Boudoir"></a>
    </div>
  </main>

  <div class="hint">Choose your path</div>

  <audio id="portalMusic" src="audio/intro-reveal.mp3" preload="auto" loop></audio>
  <button class="audio-toggle" id="audioToggle" type="button" aria-label="Toggle music">♪</button>

  <script>
    const portalMusic = document.getElementById("portalMusic");
    const audioToggle = document.getElementById("audioToggle");
    let muted = false;

    function updateAudioButton() {
      audioToggle.textContent = muted ? "♪̸" : "♪";
      audioToggle.classList.toggle("muted", muted);
      portalMusic.muted = muted;
    }

    function startMusic() {
      if (muted) return;
      portalMusic.volume = 0.38;
      portalMusic.play().catch(() => {});
    }

    updateAudioButton();
    startMusic();

    window.addEventListener("pointerdown", startMusic, { once: true });
    window.addEventListener("touchstart", startMusic, { once: true });

    audioToggle.addEventListener("click", () => {
      muted = !muted;
      updateAudioButton();
      if (!muted) startMusic();
      else portalMusic.pause();
    });
  </script>
</body>
</html>
