<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayvn | Three Paths. One Purpose.</title>

  <link rel="preload" as="image" href="images/hayvn-logo-gold.png">
  <link rel="preload" as="image" href="images/hayvn-portal-mobile.png">

  <style>
    :root{
      --black:#030302;
      --gold-soft:#f1d48b;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#030302;
      font-family:system-ui,sans-serif;
    }

    .portal{
      position:relative;
      width:100vw;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#030302;
      overflow:hidden;
    }

    .portal::before{
      content:"";
      position:absolute;
      inset:-20%;
      z-index:0;
      pointer-events:none;
      background:radial-gradient(circle at center, rgba(215,173,95,.10), rgba(215,173,95,.035) 28%, transparent 58%);
      animation:backgroundBreath 6s ease-in-out infinite;
    }

    .portal::after{
      content:"";
      position:absolute;
      inset:-10%;
      z-index:0;
      pointer-events:none;
      opacity:0;
      background:radial-gradient(circle at 50% 22%, rgba(241,212,139,.34), rgba(215,173,95,.15) 16%, rgba(215,173,95,.045) 34%, transparent 58%);
      animation:logoImpact 4.5s ease forwards .8s;
    }

    @keyframes backgroundBreath{
      0%,100%{ opacity:.45; transform:scale(1); }
      50%{ opacity:.78; transform:scale(1.05); }
    }

    @keyframes logoImpact{
      0%{ opacity:0; transform:scale(.82); filter:blur(20px); }
      24%{ opacity:1; transform:scale(1.02); filter:blur(4px); }
      60%{ opacity:.42; transform:scale(1.24); filter:blur(12px); }
      100%{ opacity:0; transform:scale(1.42); filter:blur(28px); }
    }

    .portal-stage{
      position:relative;
      overflow:hidden;
      width:min(100vw, 177.78vh);
      height:min(100vh, 56.25vw);
      opacity:0;
      animation:portalReveal 4.2s ease forwards;
      z-index:1;
    }

    .portal-stage::before{
      content:"";
      position:absolute;
      inset:-10%;
      z-index:3;
      pointer-events:none;
      background:radial-gradient(circle at 50% 50%, rgba(255,245,200,.26) 0%, rgba(241,212,139,.18) 12%, rgba(215,173,95,.12) 24%, rgba(80,20,0,.22) 36%, rgba(0,0,0,.94) 58%);
      mix-blend-mode:screen;
      filter:blur(18px) contrast(130%) saturate(135%);
      transform:translateX(-135%) skewX(-8deg) scale(1.3);
      animation:burnReveal 4.8s cubic-bezier(.18,.7,.2,1) forwards .2s;
    }

    .portal-stage::after{
      content:"";
      position:absolute;
      inset:-10%;
      z-index:2;
      pointer-events:none;
      background:radial-gradient(circle at 50% 50%, rgba(255,240,180,.10) 0%, rgba(241,212,139,.05) 14%, transparent 36%);
      opacity:0;
      filter:blur(24px) saturate(140%);
      transform:translateX(-135%) skewX(-8deg) scale(1.5);
      animation:emberTrail 5s ease forwards .4s;
    }

    .hayvn-flash{
      position:absolute;
      left:31%;
      top:8.5%;
      width:38%;
      height:22%;
      z-index:4;
      pointer-events:none;
      opacity:0;
      background:radial-gradient(ellipse at center, rgba(255,246,205,.44) 0%, rgba(241,212,139,.25) 24%, rgba(215,173,95,.10) 46%, transparent 72%);
      filter:blur(14px) drop-shadow(0 0 28px rgba(241,212,139,.45)) drop-shadow(0 0 68px rgba(215,173,95,.25));
      animation:hayvnLogoSettle 4.4s ease forwards 1.25s;
    }

    @keyframes hayvnLogoSettle{
      0%{ opacity:0; transform:scale(.72) translateY(18px); filter:blur(28px); }
      22%{ opacity:1; transform:scale(1.08) translateY(0); filter:blur(8px) drop-shadow(0 0 36px rgba(241,212,139,.68)); }
      46%{ opacity:.72; transform:scale(1.18); filter:blur(14px) drop-shadow(0 0 76px rgba(215,173,95,.38)); }
      100%{ opacity:0; transform:scale(1.35); filter:blur(30px); }
    }

    @keyframes burnReveal{
      0%{ transform:translateX(-135%) skewX(-8deg) scale(1.3); opacity:0; }
      10%{ opacity:1; }
      55%{ opacity:1; }
      100%{ transform:translateX(145%) skewX(-8deg) scale(1.36); opacity:0; }
    }

    @keyframes emberTrail{
      0%{ opacity:0; }
      12%{ opacity:.7; }
      65%{ opacity:.34; }
      100%{ opacity:0; transform:translateX(145%) skewX(-8deg) scale(1.7); }
    }

    picture,
    .portal-image{
      width:100%;
      height:100%;
      display:block;
    }

    .portal-image{
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
    }

    .portal-link{
      position:absolute;
      z-index:5;
      display:block;
      cursor:pointer;
      width:17.9%;
      aspect-ratio:1 / 1;
      border-radius:50%;
      background:transparent;
      border:1px solid transparent;
      transition:transform .28s ease, box-shadow .28s ease, border-color .28s ease;
      animation:circleAwaken 2.8s ease forwards 4.6s;
    }

    @keyframes circleAwaken{
      0%{ border-color:transparent; box-shadow:none; }
      22%{
        border-color:rgba(241,212,139,.95);
        box-shadow:0 0 22px rgba(241,212,139,.85), 0 0 52px rgba(215,173,95,.58), 0 0 92px rgba(215,173,95,.30), inset 0 0 26px rgba(241,212,139,.12);
      }
      52%{
        border-color:rgba(241,212,139,.68);
        box-shadow:0 0 16px rgba(241,212,139,.54), 0 0 38px rgba(215,173,95,.36), 0 0 68px rgba(215,173,95,.18), inset 0 0 18px rgba(241,212,139,.08);
      }
      100%{ border-color:transparent; box-shadow:none; }
    }

    .portal-link:hover,
    .portal-link:focus-visible{
      transform:scale(1.025);
      border-color:rgba(241,212,139,.48);
      box-shadow:0 0 10px rgba(241,212,139,.42), 0 0 24px rgba(215,173,95,.30), 0 0 48px rgba(215,173,95,.13), inset 0 0 14px rgba(241,212,139,.06);
      animation:portalPulse 1.8s ease-in-out infinite;
    }

    @keyframes portalPulse{
      0%,100%{
        box-shadow:0 0 10px rgba(241,212,139,.38), 0 0 22px rgba(215,173,95,.26), 0 0 42px rgba(215,173,95,.11), inset 0 0 14px rgba(241,212,139,.05);
      }
      50%{
        box-shadow:0 0 14px rgba(241,212,139,.58), 0 0 32px rgba(215,173,95,.42), 0 0 62px rgba(215,173,95,.20), inset 0 0 18px rgba(241,212,139,.08);
      }
    }

    .healing{ left:21%; top:42.25%; }
    .studio{ left:40.85%; top:42.25%; }
    .boudoir{ left:60.90%; top:42.25%; }

    .audio-toggle{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:20;
      width:46px;
      height:46px;
      border:none;
      border-radius:999px;
      background:rgba(0,0,0,.42);
      backdrop-filter:blur(12px);
      color:var(--gold-soft);
      cursor:pointer;
      font-size:18px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:transform .25s ease, opacity .25s ease;
    }

    .audio-toggle:hover{ transform:scale(1.08); }
    .audio-toggle.muted{ opacity:.55; }

    @keyframes portalReveal{
      0%{
        opacity:0;
        transform:scale(1.1) translateY(14px);
        filter:blur(30px) brightness(.45);
      }
      34%{
        opacity:.38;
        filter:blur(16px) brightness(.72);
      }
      68%{
        opacity:1;
        transform:scale(1.018) translateY(0);
        filter:blur(0) brightness(1.05);
      }
      100%{
        opacity:1;
        transform:scale(1);
        filter:blur(0) brightness(1);
      }
    }

    .healing-transition{
      position:fixed;
      inset:0;
      z-index:999;
      background:#030302;
      opacity:0;
      pointer-events:none;
      transition:opacity 1400ms ease;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .healing-transition.active{
      opacity:1;
      pointer-events:auto;
    }

    .healing-transition video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#030302;
      opacity:0;
      transform:scale(.985);
      transition:opacity 1600ms ease, transform 2200ms ease;
    }

    .healing-transition.active video{
      opacity:1;
      transform:scale(1);
    }

    .healing-transition.fade-black{
      background:#000;
    }

    .healing-transition.fade-black video{
      opacity:0;
      transform:scale(1.015);
      transition:opacity 1300ms ease, transform 1300ms ease;
    }

    @media (max-width:760px){
      .portal-stage{
        width:100vw;
        height:100svh;
      }

      .portal-image{
        object-fit:cover;
      }

      .hayvn-flash{
        left:10%;
        top:6%;
        width:80%;
        height:22%;
      }

      .portal-link{
        width:48%;
      }

      .healing{ left:23%; top:30%; }
      .studio{ left:26%; top:54%; }
      .boudoir{ left:26%; top:74%; }

      .audio-toggle{
        width:42px;
        height:42px;
        right:14px;
        bottom:14px;
      }

      .healing-transition video{
        object-fit:cover;
      }
    }
  </style>
</head>

<body>

  <main class="portal">
    <div class="portal-stage">
      <picture>
        <source media="(max-width:760px)" srcset="images/hayvn-portal-mobile.png">
        <img class="portal-image" src="images/hayvn-logo-gold.png" alt="Hayvn Portal" fetchpriority="high" decoding="async">
      </picture>

      <div class="hayvn-flash"></div>

      <a class="portal-link healing" href="https://hayvnhealing.com" onclick="healingPortalExit(event,this.href)" aria-label="Hayvn Healing"></a>
      <a class="portal-link studio" href="studio.html?skipIntro=1" onclick="portalExit(event,this.href)" aria-label="Hayvn Studio"></a>
      <a class="portal-link boudoir" href="https://hayvnboudoir.com" onclick="portalExit(event,this.href)" aria-label="Hayvn Boudoir"></a>
    </div>
  </main>

  <div class="healing-transition" id="healingTransition">
    <video id="healingVideo" src="videos/healing-transition.mp4" playsinline preload="auto"></video>
  </div>

  <audio id="portalMusic" src="audio/intro-reveal.mp3" preload="auto" loop></audio>
  <button class="audio-toggle" id="audioToggle" type="button" aria-label="Toggle music">♪</button>

  <script>
    const portalMusic = document.getElementById("portalMusic");
    const audioToggle = document.getElementById("audioToggle");
    const healingTransition = document.getElementById("healingTransition");
    const healingVideo = document.getElementById("healingVideo");

    let muted = false;

    function updateAudioButton(){
      audioToggle.textContent = muted ? "♪̸" : "♪";
      audioToggle.classList.toggle("muted", muted);
      portalMusic.muted = muted;
    }

    function startMusic(){
      if(muted) return;
      portalMusic.volume = 0.38;
      portalMusic.play().catch(() => {});
    }

    function fadePortalMusic(targetVolume, duration){
      if(!portalMusic) return;

      const startVolume = portalMusic.volume;
      const startTime = performance.now();

      function step(now){
        const progress = Math.min((now - startTime) / duration, 1);
        portalMusic.volume = startVolume + (targetVolume - startVolume) * progress;

        if(progress < 1){
          requestAnimationFrame(step);
        }
      }

      requestAnimationFrame(step);
    }

    function portalExit(event,url){
      event.preventDefault();

      document.body.animate(
        [
          { opacity:1, filter:"blur(0px)" },
          { opacity:0, filter:"blur(12px)" }
        ],
        {
          duration:900,
          easing:"ease"
        }
      );

      setTimeout(() => {
        window.location.href = url;
      }, 720);
    }

    function healingPortalExit(event,url){
      event.preventDefault();

      healingTransition.classList.add("active");
      fadePortalMusic(0.04, 1400);

      healingVideo.currentTime = 0;
      healingVideo.muted = muted;
      healingVideo.volume = muted ? 0 : 0.85;

      const playPromise = healingVideo.play();

      if(playPromise){
        playPromise.catch(() => {
          setTimeout(() => {
            window.location.href = url;
          }, 2200);
        });
      }

      healingVideo.onended = () => {
        healingTransition.classList.add("fade-black");

        setTimeout(() => {
          window.location.href = url;
        }, 1400);
      };

      setTimeout(() => {
        if(!healingTransition.classList.contains("fade-black")){
          healingTransition.classList.add("fade-black");

          setTimeout(() => {
            window.location.href = url;
          }, 1400);
        }
      }, 10000);
    }

    updateAudioButton();
    startMusic();

    window.addEventListener("pointerdown", startMusic, { once:true });
    window.addEventListener("touchstart", startMusic, { once:true });

    audioToggle.addEventListener("click", () => {
      muted = !muted;
      updateAudioButton();

      if(!muted){
        startMusic();
      }else{
        portalMusic.pause();
      }
    });
  </script>

</body>
</html>
