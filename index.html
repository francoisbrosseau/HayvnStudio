<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayvn | Three Paths. One Purpose.</title>

  <link rel="preload" as="image" href="images/hayvn-logo-gold.png">
  <link rel="preload" as="image" href="images/hayvn-portal-mobile.png">

  <style>
    :root{
      --black:#030302;
      --gold-soft:#f1d48b;
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#030302;
      font-family:system-ui,sans-serif;
    }

    .portal{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:#030302;
    }

    .portal-stage{
      position:relative;
      width:100%;
      height:100%;
      opacity:0;
      transform:scale(.985);
      animation:portalReveal 2.2s ease forwards;
    }

    picture,
    .portal-image{
      width:100%;
      height:100%;
      display:block;
    }

    .portal-image{
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
    }

    .portal-link{
      position:absolute;
      z-index:5;
      display:block;
      cursor:pointer;
      border-radius:50%;
      overflow:hidden;
      transition:
        transform .24s ease,
        filter .24s ease;
    }

    /* subtle hover glow */

    .portal-link:hover,
    .portal-link:focus-visible{
      transform:scale(1.018);
      filter:
        brightness(1.18)
        drop-shadow(0 0 6px rgba(241,212,139,.45))
        drop-shadow(0 0 16px rgba(215,173,95,.28));
    }

    /* DESKTOP */

    .healing{
      left:14.2%;
      top:39.8%;
      width:22.5%;
      height:39%;
    }

    .studio{
      left:38.8%;
      top:39.8%;
      width:22.5%;
      height:39%;
    }

    .boudoir{
      left:63.5%;
      top:39.8%;
      width:22.5%;
      height:39%;
    }

    .audio-toggle{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:20;

      width:46px;
      height:46px;

      border:none;
      border-radius:999px;

      background:rgba(0,0,0,.42);
      backdrop-filter:blur(12px);

      color:var(--gold-soft);

      cursor:pointer;

      font-size:18px;
      font-weight:900;

      display:flex;
      align-items:center;
      justify-content:center;

      transition:
        transform .25s ease,
        opacity .25s ease;
    }

    .audio-toggle:hover{
      transform:scale(1.08);
    }

    .audio-toggle.muted{
      opacity:.55;
    }

    @keyframes portalReveal{
      0%{
        opacity:0;
        transform:scale(.96);
        filter:blur(10px);
      }

      60%{
        opacity:1;
        transform:scale(1.01);
        filter:blur(0);
      }

      100%{
        opacity:1;
        transform:scale(1);
        filter:blur(0);
      }
    }

    /* MOBILE */

    @media (max-width:760px){

      .portal-image{
        object-fit:cover;
      }

      .healing{
        left:26%;
        top:33.8%;
        width:48%;
        height:16%;
      }

      .studio{
        left:26%;
        top:54%;
        width:48%;
        height:16%;
      }

      .boudoir{
        left:26%;
        top:74%;
        width:48%;
        height:16%;
      }

      .audio-toggle{
        width:42px;
        height:42px;
        right:14px;
        bottom:14px;
      }
    }
  </style>
</head>

<body>

  <main class="portal">

    <div class="portal-stage">

      <picture>
        <source
          media="(max-width:760px)"
          srcset="images/hayvn-portal-mobile.png"
        >

        <img
          class="portal-image"
          src="images/hayvn-logo-gold.png"
          alt="Hayvn Portal"
          fetchpriority="high"
          decoding="async"
        >
      </picture>

      <a
        class="portal-link healing"
        href="https://hayvnhealing.com"
        aria-label="Hayvn Healing"
      ></a>

      <a
        class="portal-link studio"
        href="studio.html?skipIntro=1"
        aria-label="Hayvn Studio"
      ></a>

      <a
        class="portal-link boudoir"
        href="https://hayvnboudoir.com"
        aria-label="Hayvn Boudoir"
      ></a>

    </div>

  </main>

  <audio
    id="portalMusic"
    src="audio/intro-reveal.mp3"
    preload="auto"
    loop
  ></audio>

  <button
    class="audio-toggle"
    id="audioToggle"
    type="button"
    aria-label="Toggle music"
  >♪</button>

  <script>

    const portalMusic = document.getElementById("portalMusic");
    const audioToggle = document.getElementById("audioToggle");

    let muted = false;

    function updateAudioButton(){
      audioToggle.textContent = muted ? "♪̸" : "♪";
      audioToggle.classList.toggle("muted", muted);
      portalMusic.muted = muted;
    }

    function startMusic(){
      if(muted) return;

      portalMusic.volume = 0.38;

      portalMusic.play().catch(() => {});
    }

    updateAudioButton();

    startMusic();

    window.addEventListener(
      "pointerdown",
      startMusic,
      { once:true }
    );

    window.addEventListener(
      "touchstart",
      startMusic,
      { once:true }
    );

    audioToggle.addEventListener("click", () => {

      muted = !muted;

      updateAudioButton();

      if(!muted){
        startMusic();
      }else{
        portalMusic.pause();
      }

    });

  </script>

</body>
</html>
