<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayvn | Three Paths. One Purpose.</title>

  <link rel="preload" as="image" href="images/hayvn-logo-gold.png">
  <link rel="preload" as="image" href="images/hayvn-portal-mobile.png">

  <style>
    :root{
      --black:#030302;
      --gold:#d7ad5f;
      --gold-soft:#f1d48b;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      background:var(--black);
      overflow:hidden;
      font-family:system-ui,sans-serif;
    }

    body{
      background:
        radial-gradient(circle at center, rgba(215,173,95,.08), transparent 45%),
        #030302;
    }

    .portal{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    .portal-stage{
      position:relative;
      width:100%;
      height:100%;
      opacity:0;
      transform:scale(.985);
      animation:portalReveal 2.3s ease forwards;
    }

    .portal-stage picture,
    .portal-image{
      width:100%;
      height:100%;
      display:block;
    }

    .portal-image{
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
    }

    .portal-link{
      position:absolute;
      z-index:5;
      display:block;
      border-radius:50%;
      cursor:pointer;
      transition:transform .3s ease;
    }

    .portal-link::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:72%;
      height:72%;
      transform:translate(-50%, -50%) scale(.92);
      border-radius:50%;
      opacity:0;
      pointer-events:none;
      transition:opacity .3s ease, transform .3s ease;

      background:radial-gradient(
        circle,
        rgba(241,212,139,.22) 0%,
        rgba(215,173,95,.13) 34%,
        rgba(215,173,95,.05) 58%,
        transparent 75%
      );

      box-shadow:
        0 0 18px rgba(241,212,139,.38),
        0 0 34px rgba(215,173,95,.24);
    }

    .portal-link:hover::before,
    .portal-link:focus-visible::before{
      opacity:1;
      transform:translate(-50%, -50%) scale(1);
    }

    .portal-link:hover,
    .portal-link:focus-visible{
      transform:scale(1.018);
    }

    .healing{
      left:8.8%;
      top:43.8%;
      width:24.8%;
      height:44%;
    }

    .studio{
      left:37.5%;
      top:43.8%;
      width:24.8%;
      height:44%;
    }

    .boudoir{
      left:66.2%;
      top:43.8%;
      width:24.8%;
      height:44%;
    }

    .audio-toggle{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:20;
      width:46px;
      height:46px;
      border:none;
      border-radius:999px;
      background:rgba(0,0,0,.45);
      backdrop-filter:blur(12px);
      color:var(--gold-soft);
      cursor:pointer;
      font-size:18px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:transform .25s ease, opacity .25s ease;
    }

    .audio-toggle:hover{ transform:scale(1.08); }
    .audio-toggle.muted{ opacity:.55; }

    @keyframes portalReveal{
      0%{ opacity:0; transform:scale(.96); filter:blur(10px); }
      60%{ opacity:1; transform:scale(1.01); filter:blur(0); }
      100%{ opacity:1; transform:scale(1); filter:blur(0); }
    }

    @media (max-width:760px){
      .portal-image{ object-fit:cover; }

      .healing{
        left:18%;
        top:34%;
        width:64%;
        height:17%;
      }

      .studio{
        left:18%;
        top:54%;
        width:64%;
        height:17%;
      }

      .boudoir{
        left:18%;
        top:74%;
        width:64%;
        height:17%;
      }

      .portal-link::before{
        width:76%;
        height:76%;
      }

      .audio-toggle{
        width:42px;
        height:42px;
        right:14px;
        bottom:14px;
      }
    }
  </style>
</head>

<body>
  <main class="portal">
    <div class="portal-stage">
      <picture>
        <source media="(max-width:760px)" srcset="images/hayvn-portal-mobile.png">

        <img
          class="portal-image"
          src="images/hayvn-logo-gold.png"
          alt="Hayvn Portal"
          fetchpriority="high"
          decoding="async"
        >
      </picture>

      <a class="portal-link healing" href="https://hayvnhealing.com" aria-label="Hayvn Healing"></a>
      <a class="portal-link studio" href="studio.html?skipIntro=1" aria-label="Hayvn Studio"></a>
      <a class="portal-link boudoir" href="https://hayvnboudoir.com" aria-label="Hayvn Boudoir"></a>
    </div>
  </main>

  <audio id="portalMusic" src="audio/intro-reveal.mp3" preload="auto" loop></audio>

  <button class="audio-toggle" id="audioToggle" type="button" aria-label="Toggle music">♪</button>

  <script>
    const portalMusic = document.getElementById("portalMusic");
    const audioToggle = document.getElementById("audioToggle");

    let muted = false;

    function updateAudioButton(){
      audioToggle.textContent = muted ? "♪̸" : "♪";
      audioToggle.classList.toggle("muted", muted);
      portalMusic.muted = muted;
    }

    function startMusic(){
      if(muted) return;

      portalMusic.volume = 0.38;
      portalMusic.play().catch(() => {});
    }

    updateAudioButton();
    startMusic();

    window.addEventListener("pointerdown", startMusic, { once:true });
    window.addEventListener("touchstart", startMusic, { once:true });

    audioToggle.addEventListener("click", () => {
      muted = !muted;
      updateAudioButton();

      if(!muted){
        startMusic();
      }else{
        portalMusic.pause();
      }
    });
  </script>
</body>
</html>
